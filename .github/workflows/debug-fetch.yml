name: Debug Fetch

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to diagnose'
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and inspect
        run: |
          node -e '
          const url = process.env.TARGET_URL;
          const UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
          (async () => {
            try {
              const res = await fetch(url, { headers: { "User-Agent": UA, "Accept-Language": "en-US,en;q=0.9" }, redirect: "follow" });
              console.log("status:", res.status, res.statusText);
              const text = await res.text();
              console.log("length:", text.length);

              const headerIdx = text.indexOf("c4TabbedHeaderRenderer");
              console.log("c4TabbedHeaderRenderer idx:", headerIdx);
              if (headerIdx >= 0) {
                const window = text.slice(headerIdx, headerIdx + 4000);
                const m1 = window.match(/"subscriberCountText":\{"simpleText":"([^"]+)"/);
                const m2 = window.match(/"subscriberCountText":\{"accessibility":\{"accessibilityData":\{"label":"([^"]+)"/);
                const m3 = window.match(/"videoCountText":\{"runs":\[\{"text":"([^"]+)"/);
                console.log("near-header simpleText:", m1 ? m1[1] : "NONE");
                console.log("near-header accessibility:", m2 ? m2[1] : "NONE");
                console.log("near-header videoCountText:", m3 ? m3[1] : "NONE");
              }

              // count how many times subscriberCountText appears total
              const allMatches = [...text.matchAll(/"subscriberCountText":\{"simpleText":"([^"]+)"/g)];
              console.log("total simpleText occurrences:", allMatches.length);
              allMatches.slice(0,5).forEach((m,i)=>console.log("  occurrence "+i+":", m[1]));

              const metaM = text.match(/<meta itemprop="subscriberCount" content="([^"]+)"/);
              console.log("meta itemprop subscriberCount:", metaM ? metaM[1] : "NONE");
            } catch (e) {
              console.log("FETCH ERROR:", e.message, "CAUSE:", e.cause);
            }
          })();
          '
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
