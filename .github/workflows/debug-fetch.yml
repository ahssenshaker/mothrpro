name: Debug Fetch

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to diagnose'
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and inspect
        run: |
          node -e '
          const url = process.env.TARGET_URL;
          const UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
          (async () => {
            try {
              const res = await fetch(url, { headers: { "User-Agent": UA, "Accept-Language": "en-US,en;q=0.9" }, redirect: "follow" });
              console.log("status:", res.status, res.statusText);
              const text = await res.text();
              console.log("length:", text.length);
              const patterns = {
                subscriberCountText: /"subscriberCountText":\{"simpleText":"([^"]+)"/,
                subscriberCountAccessibility: /"subscriberCountText":\{"accessibility":\{"accessibilityData":\{"label":"([^"]+)"/,
                videosCountText: /"videosCountText":\{"runs":\[\{"text":"([^"]+)"/,
              };
              for (const [k, re] of Object.entries(patterns)) {
                const m = text.match(re);
                console.log(k + ":", m ? m[1] : "NONE");
              }
              console.log("contains subscriberCountText string:", text.includes("subscriberCountText"));
            } catch (e) {
              console.log("FETCH ERROR:", e.message, "CAUSE:", e.cause);
            }
          })();
          '
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
