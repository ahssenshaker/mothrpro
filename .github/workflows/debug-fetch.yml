name: Debug Fetch

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to inspect'
        required: true
      platform:
        description: 'youtube | twitter | snapchat'
        required: true

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@latest >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Inspect DOM
        run: |
          node -e '
          const { chromium } = require("playwright");
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 500, height: 1000 }, userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" });
            try {
              await page.goto(process.env.TARGET_URL, { waitUntil: "domcontentloaded", timeout: 30000 });
            } catch (e) {
              console.log("nav warning:", e.message);
            }
            await page.waitForTimeout(4000);
            console.log("page title:", await page.title());

            const platform = process.env.PLATFORM;
            if (platform === "youtube") {
              const sels = ["#subscriber-count", "yt-formatted-string#subscriber-count", "[id*=subscriber]"];
              for (const sel of sels) {
                const el = await page.$(sel);
                console.log(sel, "=>", el ? await el.textContent() : "NOT FOUND");
              }
            } else if (platform === "twitter") {
              const bodyText = await page.textContent("body");
              console.log("contains \"Followers\":", bodyText.includes("Followers"));
              console.log("contains login wall hint:", bodyText.includes("Log in") || bodyText.includes("Sign up"));
              const m = bodyText.match(/([\d.,]+[KM]?)\s*Followers/i);
              console.log("regex followers match:", m ? m[0] : "NONE");
            } else if (platform === "snapchat") {
              const bodyText = await page.textContent("body");
              console.log("body text sample:", bodyText.slice(0, 800));
            }

            await page.screenshot({ path: "debug-screenshot.png" });
            await browser.close();
          })();
          '
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          PLATFORM: ${{ github.event.inputs.platform }}

      - name: Commit screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug-screenshot.png 2>/dev/null || true
          git commit -m "Debug screenshot [automated]" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }} || true
