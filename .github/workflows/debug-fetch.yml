name: Debug Fetch

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to screenshot'
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@latest >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Screenshot page
        run: |
          node -e '
          const { chromium } = require("playwright");
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 500, height: 900 }, userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" });
            try {
              await page.goto(process.env.TARGET_URL, { waitUntil: "networkidle", timeout: 30000 });
            } catch (e) {
              console.log("nav warning:", e.message);
            }
            await page.waitForTimeout(3000);
            await page.screenshot({ path: "screenshot.png" });
            console.log("done");
            await browser.close();
          })();
          '
        env:
          TARGET_URL: ${{ github.event.inputs.url }}

      - uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
